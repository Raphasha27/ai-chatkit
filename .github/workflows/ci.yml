name: Continuous Integration

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  frontend: 
    name: Frontend (Node.js)
    runs-on: run: working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build
        run: npm run build --if-present
        env: 
    NEXT_TELEMETRY_DISABLED: 1

  backend: 
    name: Backend (Python)
    runs-on: run: working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: -
    name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install . || true; fi
      - name: Lint Check
        run: python -m py_compile $(find . -name "*.py" -not -path "*/.*" | head -n 20) || true

  security_scan: 
    name: Security Scan (Trivy)
    needs: [frontend, backend]
    runs-on: -
    uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'